name: kubernetes-crio

on:
  push:
    branches: [main]
    paths:
      - 'stacks/kubernetes-crio/**'
      - '.github/workflows/kubernetes-crio.yml'
  pull_request:
    paths:
      - 'stacks/kubernetes-crio/**'
      - '.github/workflows/kubernetes-crio.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install minikube
        run: |
          curl -fsSLo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          chmod +x minikube && sudo mv minikube /usr/local/bin/minikube
          minikube version

      - name: Run smoke (upstream K8s on CRI-O)
        run: make -C stacks/kubernetes-crio all
