# flannel-rs DaemonSet for the containerd-rs+crun harness (Task 4).
#
# Derived from the branch's deploy/flannel/flannel-rs.yaml with ONE change: the
# image is the registry image ghcr.io/indyjonesnl/flannel-rs:v0.1.3 with
# imagePullPolicy: IfNotPresent, instead of the local flannel-rs:dev with Never.
# Reason: containerd-rs has no local-image load path — it pulls only from a
# registry and its image store is separate from Docker's — so a local-only image
# (flannel-rs:dev + Never) is invisible to it and yields ErrImageNeverPull. The
# ghcr image is pullable, so containerd-rs fetches it and runs flannel-rs under
# crun. Everything else (RBAC, ConfigMap conflist + net-conf, hostPath CNI install,
# the flannel/bridge/host-local/portmap Rust plugin chain) is verbatim from the
# branch manifest.
apiVersion: v1
kind: Namespace
metadata:
  labels:
    k8s-app: flannel
    pod-security.kubernetes.io/enforce: privileged
  name: kube-flannel
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    k8s-app: flannel
  name: flannel
  namespace: kube-flannel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    k8s-app: flannel
  name: flannel
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    k8s-app: flannel
  name: flannel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flannel
subjects:
- kind: ServiceAccount
  name: flannel
  namespace: kube-flannel
---
apiVersion: v1
data:
  cni-conf.json: |
    {
      "name": "cbr0",
      "cniVersion": "0.3.1",
      "plugins": [
        {
          "type": "flannel",
          "delegate": {
            "hairpinMode": true,
            "isDefaultGateway": true
          }
        },
        {
          "type": "portmap",
          "capabilities": {
            "portMappings": true
          }
        }
      ]
    }
  net-conf.json: |
    {
      "Network": "10.244.0.0/16",
      "EnableNFTables": false,
      "Backend": {
        "Type": "vxlan"
      }
    }
kind: ConfigMap
metadata:
  labels:
    app: flannel
    k8s-app: flannel
    tier: node
  name: kube-flannel-cfg
  namespace: kube-flannel
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-flannel-ds
  namespace: kube-flannel
  labels:
    app: flannel
    tier: node
spec:
  selector:
    matchLabels:
      app: flannel
  template:
    metadata:
      labels:
        app: flannel
        tier: node
    spec:
      hostNetwork: true
      tolerations:
      - operator: Exists
      serviceAccountName: flannel
      initContainers:
      # Install the Rust CNI plugins (flannel meta-plugin + host-local IPAM) onto
      # each node, overwriting the Go binaries. Mounted at /host/... so it does not
      # shadow the image's own /opt/cni/bin. No upstream Go flannel-cni-plugin image.
      - name: install-cni-plugins-rs
        image: ghcr.io/indyjonesnl/flannel-rs:v0.1.3
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cp -f /opt/cni/bin/flannel /opt/cni/bin/host-local /opt/cni/bin/bridge /opt/cni/bin/portmap /host/opt/cni/bin/"]
        volumeMounts:
        - name: cni-plugin
          mountPath: /host/opt/cni/bin
      - name: install-cni
        image: ghcr.io/indyjonesnl/flannel-rs:v0.1.3
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cp /etc/kube-flannel/cni-conf.json /etc/cni/net.d/10-flannel.conflist"]
        volumeMounts:
        - name: cni
          mountPath: /etc/cni/net.d
        - name: flannel-cfg
          mountPath: /etc/kube-flannel/
      containers:
      - name: kube-flannel
        image: ghcr.io/indyjonesnl/flannel-rs:v0.1.3
        imagePullPolicy: IfNotPresent
        # privileged: true (vs the branch's privileged:false + capabilities.add
        # [NET_ADMIN,NET_RAW]). containerd-rs does NOT honor a container's
        # security_context.capabilities.add_capabilities — its OCI bundle builder
        # (containerd-rs crates/runtime/src/bundle.rs) grants the full cap set ONLY
        # for privileged containers and otherwise uses the default set, so a
        # non-privileged flannel pod gets NO NET_ADMIN and flanneld fails to create
        # the vxlan link with EPERM ("create vxlan link: Operation not permitted").
        # privileged:true is the only way to get NET_ADMIN through containerd-rs
        # today; upstream flannel commonly runs privileged anyway. (Tracked: teach
        # containerd-rs to honor capabilities.add for non-privileged containers.)
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: RUST_LOG
          value: "info"
        volumeMounts:
        - name: run
          mountPath: /run/flannel
        - name: flannel-cfg
          mountPath: /etc/kube-flannel/
        - name: xtables-lock
          mountPath: /run/xtables.lock
      volumes:
      - name: run
        hostPath:
          path: /run/flannel
      - name: cni-plugin
        hostPath:
          path: /opt/cni/bin
      - name: cni
        hostPath:
          path: /etc/cni/net.d
      - name: flannel-cfg
        configMap:
          name: kube-flannel-cfg
      - name: xtables-lock
        hostPath:
          path: /run/xtables.lock
          type: FileOrCreate
