kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: youki
nodes:
  - role: control-plane
containerdConfigPatches:
  # Youki (Rust OCI runtime) driven by containerd's STOCK Go runc-v2 shim
  # (runtime_type io.containerd.runc.v2) via the runc option BinaryName -> youki.
  #
  # Why the Go shim and not containerd-shim-runc-v2-rs (the Rust shim): the Rust
  # shim boots + passes smoke but melts under sig-network [Conformance] churn
  # (drops container events -> kubelet CRI desync -> control-plane restart spiral).
  # The Go shim runs youki rock-solid: 52/52 sig-network [Conformance], 0 failures.
  #
  # cgroupfs, NOT SystemdCgroup: youki's --systemd-cgroup path fails in the kind
  # node with "systemd error: dbus connection error: ENOENT" (no systemd D-Bus),
  # which makes every sandbox create fail. cgroupfs works.
  #
  # default_runtime_name = youki -> EVERY pod (incl. system pods) runs on youki.
  - |-
    [plugins.'io.containerd.grpc.v1.cri'.containerd]
      default_runtime_name = "youki"
    [plugins.'io.containerd.grpc.v1.cri'.containerd.runtimes.'youki']
      runtime_type = "io.containerd.runc.v2"
      [plugins.'io.containerd.grpc.v1.cri'.containerd.runtimes.'youki'.options]
        BinaryName = "/usr/local/bin/youki"
        SystemdCgroup = false
