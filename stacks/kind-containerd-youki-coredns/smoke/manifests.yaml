apiVersion: v1
kind: Namespace
metadata:
  name: smoke
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smoke
data:
  message: "hello-from-configmap"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: smoke
type: Opaque
stringData:
  token: "s3cr3t-token"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: smoke
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          env:
            - name: APP_TOKEN
              valueFrom:
                secretKeyRef: { name: app-secret, key: token }
          volumeMounts:
            - name: cfg
              mountPath: /etc/appcfg
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Generous liveness: on a saturated single-node cluster the old
          # timeout=1s/period=5s/failure=3 tripped under transient load, killing
          # and restarting the container — which raced `kubectl exec` ("container
          # not found"). 6 x 20s failures (~120s) before a kill won't flap on load
          # spikes while still exercising the liveness path.
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: cfg
          configMap: { name: app-config }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: smoke
spec:
  selector: { app: web }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: smoke
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 64Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pvc-writer
  namespace: smoke
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: writer
          image: busybox:1.36
          command: ["sh", "-c", "echo persisted > /data/marker && cat /data/marker"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: data }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dns-test
  namespace: smoke
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: dns
          image: busybox:1.36
          # Retry within the pod (~60s) so transient CoreDNS/Service-record lag on
          # a busy cluster doesn't fail the lookup. Still fails if DNS is truly
          # broken. On success the nslookup output (containing the FQDN) is printed.
          command: ["sh", "-c", "for i in $(seq 1 20); do nslookup web.smoke.svc.cluster.local && exit 0; echo \"dns retry $i\"; sleep 3; done; exit 1"]
