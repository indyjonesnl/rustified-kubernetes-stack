# Contingency artifact only. In this stack `youki` is containerd's DEFAULT runtime
# (see kind-config.yaml), so every pod already runs on youki and nothing needs this
# RuntimeClass. It exists for the opt-in fallback: if you set a non-youki default
# runtime, add `runtimeClassName: youki` to a workload to pin it to youki. The
# handler name must match the containerd runtime key in kind-config.yaml.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: youki
handler: youki
