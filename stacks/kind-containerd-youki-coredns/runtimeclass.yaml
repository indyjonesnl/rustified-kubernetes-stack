# Contingency artifact only. In this stack `rust-youki` is containerd's DEFAULT
# runtime, so every pod already runs on the Rust shim + youki and nothing needs
# this RuntimeClass. It exists for the opt-in fallback (see kind-config.yaml): if
# a future shim regression prevents booting youki as default, drop
# `default_runtime_name` and add `runtimeClassName: rust-youki` to workloads.
# Note: because Dockerfile.node symlinks runc->youki globally, this grants no
# real runtime isolation — it only pins the shim handler.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: rust-youki
handler: rust-youki
